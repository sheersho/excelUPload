# Database settings (default: local H2 file DB)
db.url=jdbc:h2:./data/excel_upload
db.username=sa
db.password=
db.driver=org.h2.Driver
db.table=employees

# H2 Web Console (available at http://localhost:8080/h2-console when server is running)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:./data/excel_upload
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none

# Upload size limits (adjust if Excel files are larger)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Excel parsing settings
excel.sheetName=Sheet1
excel.headerRowIndex=0
excel.startDataRowIndex=1

# Mappings: Excel Header:db_column (comma separated)
mapping.columns=receiptdate:receipt_date,invoice_no:invoice_no,enquiry_reference:enquiry_reference,policy_number:policy_number,Biller Txn Status:biller_txn_status

# Unique key columns (DB column names). If blank, the first 3-4 mapped columns are used.
dedupe.columns=invoice_no,enquiry_reference,policy_number,receipt_date

# Creates target table automatically with VARCHAR(255) columns when true
sql.autoCreateTable=true

