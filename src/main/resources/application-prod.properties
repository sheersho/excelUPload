# Production Configuration for Render.com with PostgreSQL
# This file is used when deployed to Render.com
# Activated with SPRING_PROFILES_ACTIVE=prod environment variable

# PostgreSQL Database - Read from DATABASE_URL environment variable (set in Render)
# DATABASE_URL format: postgresql://username:password@host:5432/database
# This is automatically provided by Render when you create a PostgreSQL service
db.url=${DATABASE_URL}
db.driver=org.postgresql.Driver
db.table=employees

# Extract username/password from DATABASE_URL (Render provides full URL)
# Note: Our custom code uses db.url and db.driver directly
# Spring Boot properties are set for potential future use
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Upload size limits for Excel files sent via Postman/curl
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Excel parsing settings
# Leave sheetName blank to auto-use the first sheet in the workbook (handles any sheet name)
excel.sheetName=
excel.headerRowIndex=0
excel.startDataRowIndex=1

# Mappings: Excel Header:db_column (comma separated)
# IMPORTANT: Update these to match YOUR Excel file headers
mapping.columns=receiptdate:receipt_date,invoice_no:invoice_no,enquiry_reference:enquiry_reference,policy_number:policy_number,Biller Txn Status:biller_txn_status

# Unique key columns (DB column names) for deduplication
# IMPORTANT: These must exist in your mapped columns
dedupe.columns=invoice_no,enquiry_reference,policy_number,receipt_date

# Auto-create table if missing (set to false if table already exists)
sql.autoCreateTable=true

# Logging
logging.level.root=INFO
logging.level.org.example=DEBUG

