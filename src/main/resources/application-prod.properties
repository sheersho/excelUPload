# Production Configuration for Render.com with PostgreSQL
# This file is used when deployed to Render.com
# Automatically loaded when SPRING_PROFILES_ACTIVE=prod

# PostgreSQL Database (Provided by Render.com)
# Connection string format: postgresql://username:password@hostname:5432/database
# These will be provided as DATABASE_URL environment variable by Render.com
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/excel_upload}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Database properties (mapping for our application)
db.url=${spring.datasource.url}
db.driver=org.postgresql.Driver
db.username=${spring.datasource.username}
db.password=${spring.datasource.password}
db.table=employees

# Spring Boot JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Connection Pool Settings (for production stability)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Excel parsing settings
excel.sheetName=Sheet1
excel.headerRowIndex=0
excel.startDataRowIndex=1

# Mappings: Excel Header:db_column (comma separated)
# Adjust these to match your Excel file headers
mapping.columns=receiptdate:receipt_date,invoice_no:invoice_no,enquiry_reference:enquiry_reference,policy_number:policy_number,Biller Txn Status:biller_txn_status

# Unique key columns (DB column names) for deduplication
dedupe.columns=invoice_no,enquiry_reference,policy_number,receipt_date

# Creates target table automatically with VARCHAR(255) columns when true
sql.autoCreateTable=true

# Logging
logging.level.root=INFO
logging.level.org.example=DEBUG
logging.file.name=/app/logs/excel-upload.log

